name: Publish to npm

# 触发条件：release-please 在 Release PR 合并时创建并发布 GitHub Release
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # 只读 —— GitHub Release 已由 release-please 创建
      id-token: write     # npm provenance 需要
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Verify package contents (防止敏感文件泄露)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
